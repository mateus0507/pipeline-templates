apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{APP_NAME}}-deployment
spec:
  literals:
    - SERVICE_NAME={{APP_NAME}}
  replicas: 1
  selector:
    matchLabels:
      app: next-app
  template:
    metadata:
      labels:
        app: next-app
    spec:
      containers:
        - name: next-app
          image: next-app:latest
          ports:
            - containerPort: 3000