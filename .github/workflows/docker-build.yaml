# Nome do workflow reutilizável
# Esse template é responsável por criar a imagem Docker da aplicação
name: Docker build

# Define quando esse workflow pode ser executado
# workflow_call significa que ele só será executado quando outro workflow chamar este template
on:
  workflow_call:

    # Define os parâmetros (inputs) que podem ser enviados pelo workflow que chamar este template
    inputs:

      # Nome da imagem Docker que será criada
      image_name:

        # Esse parâmetro é obrigatório
        required: true

        # Tipo do parâmetro (string)
        type: string

      # Diretório que será usado como contexto do Docker build
      context_dir:

        # Esse parâmetro não é obrigatório
        required: false

        # Tipo string
        type: string

        # Valor padrão caso nada seja enviado
        # "." significa a raiz do repositório
        default: .

# Define os jobs que serão executados
jobs:

  # Nome do job responsável por criar a imagem Docker
  docker-build:

    # Define o sistema operacional da máquina virtual que executará o job
    runs-on: ubuntu-latest

    # Lista de passos que serão executados dentro do job
    steps:

      - name: Checkout do código da aplicação
        uses: actions/checkout@v4
        with:
          path: app

      - name: Checkout do repositório de templates
        uses: actions/checkout@v4
        with:
          repository: mateus0507/pipeline-templates
          ref: main
          path: templates

      # Segundo passo: construir a imagem Docker
      - name: Build da imagem Docker

        # Executa o comando docker build
        run: docker build -f templates/Dockerfile -t ${{ inputs.image_name }}:${{ github.sha }} app/${{ inputs.context_dir }}
        # -t define o nome e a tag da imagem Docker
        # ${{ inputs.image_name }} é o nome da imagem enviado pelo workflow principal
        # ${{ github.sha }} usa o hash do commit atual como tag da imagem
        # Isso ajuda a versionar as imagens automaticamente
        # ${{ inputs.context_dir }} define qual pasta será usada como contexto para o Docker build

      # Terceiro passo: rodar a imagem Docker para verificar se ela funciona
      - name: Rodar a imagem Docker
        run: docker run -d --name my-container -p 3000:3000 ${{ inputs.image_name }}:${{ github.sha }}
        # Executa a imagem Docker criada para verificar se ela funciona corretamente
      - name: Verificar se o container está rodando
        run: |
          sleep 10
          echo "--- CONTEÚDO DO SITE (LOCALHOST:3000) ---"
          
          # Tenta capturar o corpo. Se falhar, avisa, mas não para a pipeline.
          if curl -sS http://localhost:3000; then
            echo -e "\n\n SUCESSO: O site respondeu corretamente!"
          else
            echo -e "\n\n AVISO: Não foi possível acessar o localhost:3000."
            echo "Logs do container para depuração:"
            docker logs my-container
          fi
          
          # Garante que este passo sempre termine com sucesso
          exit 0