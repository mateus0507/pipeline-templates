# Nome do workflow reutilizável
# Esse template é responsável por validar a aplicação REACT antes do build Docker
name: React

# Define quando esse workflow pode ser executado
# workflow_call significa que ele não roda sozinho
# Ele só executa quando outro workflow chamar esse template
on:
  workflow_call:

    # Define os parâmetros que podem ser recebidos do workflow que chamar este template
    inputs:

      # Define a versão do Node.js que será usada no job
      # Mantido por compatibilidade com o padrão dos outros templates
      node_version:

        # Esse parâmetro não é obrigatório
        required: false

        # Tipo do parâmetro
        type: string

        # Valor padrão caso nada seja enviado pelo workflow que chamou
        default: "20"

# Define os jobs que serão executados
jobs:

  # Nome do job responsável por validar a aplicação
  build:

    # Define o sistema operacional do runner do GitHub Actions
    # ubuntu-latest é o ambiente padrão usado na maioria das pipelines
    runs-on: ubuntu-latest

    # Lista de etapas que serão executadas dentro do job
    steps:

      # Primeiro passo: baixar o código do repositório que chamou o workflow
      - name: Checkout do código

        # Action oficial do GitHub que faz o checkout do repositório no runner
        uses: actions/checkout@v4

      # Segundo passo: configurar o ambiente Node.js
      # Esse passo é mantido para seguir o padrão do template React
      - name: Configurar Node.js

        # Action oficial que instala a versão do Node.js desejada
        uses: actions/setup-node@v4

        # Define qual versão do Node será instalada
        with:
          node-version: ${{ inputs.node_version }}

      # Terceiro passo: validar se o projeto possui package.json
      # Isso garante que o repositório possui a estrutura mínima esperada
      - name: Validar package.json

        # Verifica se o arquivo package.json existe na raiz do projeto
        run: |
          if [ ! -f package.json ]; then
            echo "package.json não encontrado na raiz do projeto."
            exit 1
          fi

      # Quarto passo: validar se o projeto parece ser React
      # Essa checagem ajuda a garantir que o template correto foi chamado
      - name: Validar projeto React

        # Procura pela dependência react dentro do package.json
        run: |
          if grep -q '"react"' package.json; then
            echo "Projeto React identificado com sucesso."
          else
            echo "A dependência react não foi encontrada no package.json."
            exit 1
          fi

      # Quinto passo: informar que o build da aplicação será feito no Dockerfile
      # Nesse funil, npm install e npm run build não acontecem aqui
      - name: Informar build via Docker

        # Apenas registra no log que a próxima etapa do funil será o docker-build
        run: echo "Validação concluída. O build da aplicação será executado no Dockerfile, na etapa docker-build."