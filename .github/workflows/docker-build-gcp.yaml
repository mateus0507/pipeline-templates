name: Build e Push para GCP

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      project_id:
        required: true
        type: string
      region:
        required: true
        type: string
      repository:
        required: true
        type: string
    secrets:
      GCP_CREDENTIALS:
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Autenticar no GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Instalar gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configurar Docker para o GCP
        run: |
          gcloud auth configure-docker ${{ inputs.region }}-docker.pkg.dev --quiet

      - name: Build da imagem
        run: |
          docker build \
            -t ${{ inputs.region }}-docker.pkg.dev/${{ inputs.project_id }}/${{ inputs.repository }}/${{ inputs.image_name }}:${{ github.sha }} \
            .

      - name: Push da imagem
        run: |
          docker push \
            ${{ inputs.region }}-docker.pkg.dev/${{ inputs.project_id }}/${{ inputs.repository }}/${{ inputs.image_name }}:${{ github.sha }}