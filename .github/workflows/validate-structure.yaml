name: Validate Structure

on:
  workflow_call:
    inputs:
      kustomize_repo:
        required: true
        type: string
      app_name:
        required: true
        type: string
      kustomize_ref:
        required: false
        type: string
        default: main
    secrets:
      KUSTOMIZE_TOKEN:
        required: true

jobs:
  validate-structure:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório de templates
        uses: actions/checkout@v4
        with:
          repository: Mat3us-tech/pipeline-templates
          path: pipeline-templates

      - name: Checkout do repositório kustomize
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.kustomize_repo }}
          ref: ${{ inputs.kustomize_ref }}
          token: ${{ secrets.KUSTOMIZE_TOKEN }}
          path: kustomize

      - name: Validar e copiar arquivos faltantes
        id: structure
        shell: bash
        run: |
          set -euo pipefail

          TEMPLATE_DIR="pipeline-templates/modelos/aplication"
          TARGET_DIR="kustomize/app/${{ inputs.app_name }}"
          APP_NAME="${{ inputs.app_name }}"

          CHANGED=false

          echo "Garantindo estrutura base..."
          mkdir -p "$TARGET_DIR"
          
          declare -A FILE_MAP=(
            ["deployment.yaml"]="deployment.yaml"
            ["service.yaml"]="service.yaml"
            ["ingress.yaml"]="ingress.yaml"
            ["configmap.yaml"]="configmap.yaml"
            ["kustomization.yaml"]="kustomization.yaml"
          )

          echo "Verificando arquivos obrigatórios..."

          for source in "${!FILE_MAP[@]}"; do
            target="${FILE_MAP[$source]}"

            SOURCE_FILE="$TEMPLATE_DIR/$source"
            TARGET_FILE="$TARGET_DIR/$target"

            if [ ! -f "$SOURCE_FILE" ]; then
              echo "Erro: template $SOURCE_FILE não encontrado."
              exit 1
            fi

            if [ ! -f "$TARGET_FILE" ]; then
              echo "Arquivo $TARGET_FILE não existe. Copiando template..."

              cp "$SOURCE_FILE" "$TARGET_FILE"

              echo "Substituindo variáveis no arquivo..."
              sed -i "s/{{APP_NAME}}/$APP_NAME/g" "$TARGET_FILE"

              CHANGED=true
            else
              echo "OK: $TARGET_FILE já existe."
            fi
          done

          echo "Revalidando estrutura final..."

          for source in "${!FILE_MAP[@]}"; do
            target="${FILE_MAP[$source]}"

            if [ ! -f "$TARGET_DIR/$target" ]; then
              echo "Erro: arquivo obrigatório ausente: $TARGET_DIR/$target"
              exit 1
            fi
          done

          echo "Estrutura validada com sucesso."
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Mostrar estrutura final
        shell: bash
        run: |
          echo "Conteúdo final em kustomize/app/${{ inputs.app_name }}:"
          ls -la "kustomize/app/${{ inputs.app_name }}"

      - name: Configurar Git
        if: steps.structure.outputs.changed == 'true'
        shell: bash
        run: |
          cd kustomize
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commitar alterações
        if: steps.structure.outputs.changed == 'true'
        shell: bash
        run: |
          cd kustomize
          git add app
          git commit -m "chore: garantir estrutura base para ${{ inputs.app_name }}"

      - name: Push das alterações
        if: steps.structure.outputs.changed == 'true'
        shell: bash
        run: |
          cd kustomize
          git push origin "${{ inputs.kustomize_ref }}"