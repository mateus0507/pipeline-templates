name: Deploy Kubernetes  # Nome do workflow responsável pelo deploy

on:
  workflow_call:  # Permite reutilizar esse workflow em outros pipelines
    inputs:
      image_name:  # Nome da imagem que será usada no deploy
        required: true
        type: string
      deployment_name:  # Nome do deployment no Kubernetes
        required: true
        type: string
      container_name:  # Nome do container dentro do deployment
        required: true
        type: string
      manifests_path:  # Caminho onde estão os arquivos YAML (deployment/service)
        required: false
        type: string
        default: ./k8s  # Caminho padrão
    secrets:
      DOCKERHUB_USERNAME:  # Usuário do Docker Hub (usado para montar a imagem completa)
        required: true

jobs:
  deploy:
    runs-on: self-hosted  # Executa em runner próprio (máquina local/servidor)

    steps:
      - name: Checkout do código  # Baixa o código do repositório
        uses: actions/checkout@v4

      - name: Verificar kubectl  # Verifica se o kubectl está instalado
        run: kubectl version --client

      - name: Aguardar Minikube  # Garante que o Minikube está rodando
        shell: powershell
        run: |
          minikube status  # Mostra o status atual do Minikube
          minikube start --driver=docker  # Inicia o cluster caso não esteja rodando
          minikube update-context  # Atualiza o contexto do kubectl
          kubectl config use-context minikube  # Define o contexto para o Minikube
          kubectl get nodes  # Verifica se o node está disponível

      - name: Verificar cluster  # Mostra informações do cluster Kubernetes
        shell: powershell
        run: |
          kubectl config current-context  # Mostra o contexto atual
          kubectl get nodes  # Lista os nodes
          kubectl cluster-info  # Informações gerais do cluster

      - name: Montar nome completo da imagem  # Monta o nome da imagem com usuário + nome + tag
        shell: powershell
        run: |
          $fullImage = "${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}"  # Junta usuário + imagem
          Write-Host "Imagem final: $fullImage"  # Exibe a imagem final
          "FULL_IMAGE=$fullImage" | Out-File -FilePath $env:GITHUB_ENV -Append  # Salva como variável de ambiente

      - name: Substituir imagem no deployment
        shell: powershell
        run: |
          # Lê o arquivo deployment.yaml e substitui a imagem
          (Get-Content "${{ inputs.manifests_path }}/deployment.yaml") `
            -replace 'IMAGE_PLACEHOLDER', $env:FULL_IMAGE `
            | Set-Content "${{ inputs.manifests_path }}/deployment.yaml"

          # Mostra o resultado final
          Write-Host "Deployment final:"
          Get-Content "${{ inputs.manifests_path }}/deployment.yaml"

      - name: Aplicar manifestos  # Aplica os arquivos YAML no Kubernetes
        shell: powershell
        run: |
          kubectl apply -f ${{ inputs.manifests_path }}/deployment.yaml  # Cria/atualiza o deployment
          kubectl apply -f ${{ inputs.manifests_path }}/service.yaml  # Cria/atualiza o service

      - name: Mostrar recursos  # Mostra o estado atual dos recursos no cluster
        shell: powershell
        run: |
          kubectl get deployments  # Lista deployments
          kubectl get pods  # Lista pods
          kubectl get svc  # Lista serviços