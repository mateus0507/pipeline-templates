name: Docker Validate

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      tag:
        required: true
        type: string
      app_port:
        required: false
        type: string
        default: "3000"
      health_path:
        required: false
        type: string
        default: "/"
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  validate:
    runs-on: ubuntu-latest

    env:
      IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}:${{ inputs.tag }}
      CONTAINER_NAME: validate-${{ github.run_id }}
      APP_PORT: ${{ inputs.app_port }}
      HEALTH_PATH: ${{ inputs.health_path }}

    steps:
      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull da imagem
        run: |
          docker pull "$IMAGE"

      - name: Rodar container
        run: |
          docker run -d \
            --name "$CONTAINER_NAME" \
            -p "$APP_PORT:$APP_PORT" \
            "$IMAGE"

      - name: Validar aplicação
        run: |
          echo "Validando container..."

          if [ "$(docker inspect -f '{{.State.Running}}' "$CONTAINER_NAME")" != "true" ]; then
            echo "Erro ao subir container"
            docker logs "$CONTAINER_NAME" || true
            exit 1
          fi

          echo "Container rodando com sucesso"
          echo "Testando aplicação em http://localhost:$APP_PORT$HEALTH_PATH"

          for i in {1..10}; do
            response=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:$APP_PORT$HEALTH_PATH" || true)

            echo "Tentativa $i - Status HTTP: $response"

            if [ "$response" = "200" ]; then
              echo "Aplicação respondeu corretamente"
              exit 0
            fi

            sleep 3
          done

          echo "Erro: aplicação não respondeu com 200"
          docker logs "$CONTAINER_NAME" || true
          exit 1

      - name: Limpar container
        if: always()
        run: |
          docker stop "$CONTAINER_NAME" || true
          docker rm "$CONTAINER_NAME" || true